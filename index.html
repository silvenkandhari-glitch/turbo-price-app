<!DOCTYPE html>
<html>
<head>

<title>ZIEDEL PRICE LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
h2{font-family:'Poppins';background:#212529;color:white;padding:14px;border-radius:6px;text-align:center;font-size:30px;}

input,select{padding:8px;margin:5px;width:170px;}
button{padding:8px 14px;margin:5px;background:#495057;color:white;border:none;border-radius:5px;cursor:pointer;}

table{margin-top:10px;border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#495057;color:white;}
.price{font-weight:bold;color:#2D6A4F;}
</style>

</head>

<body>

<h2>ZIEDEL PRICE LIST</h2>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<div id="adminControls" style="display:none;">

<input id="search" placeholder="Search anything...">

<select id="filterType">
<option value="all">All Types</option>
<option value="CHRA">CHRA</option>
<option value="Turbocharger">Turbocharger</option>
</select>

<br><br>

<input id="part" placeholder="Part No">
<input id="desc" placeholder="Description">
<input id="make" placeholder="Car Make">
<input id="engine" placeholder="Engine Model">

<select id="type">
<option>CHRA</option>
<option>Turbocharger</option>
</select>

<input id="priceUSD" placeholder="Price ($)">

<br>

<button id="addBtn">Add</button>
<button id="updateBtn" style="display:none;">Update</button>

<br><br>

<button onclick="downloadCSV()">Download Excel</button>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<br>

<button onclick="openCustomer()">Customer Catalog Link</button>

</div>

<table id="table"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIuTPfhuiUpkyT48ASOZ6k22rYc2xqs48",
  authDomain: "ziedel-price-list.firebaseapp.com",
  projectId: "ziedel-price-list"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data = [];
let editId = null;

// AUTH
onAuthStateChanged(auth, async(user)=>{
if(user){
loginBox.style.display="none";
adminControls.style.display="block";
await fetchData();
}
});

window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.signup = ()=>createUserWithEmailAndPassword(auth,email.value,password.value);

// FETCH
async function fetchData(){
let snap = await getDocs(collection(db,"parts"));
data = [];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

// ADD
addBtn.onclick = async()=>{
let usd = parseFloat(priceUSD.value);
if(!usd) return alert("Enter price");

let item = {
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
};

let docRef = await addDoc(collection(db,"parts"),item);
data.push({id:docRef.id,...item});

render();
clearForm();
};

// UPDATE
updateBtn.onclick = async()=>{
let usd = parseFloat(priceUSD.value);

let item = {
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
};

await updateDoc(doc(db,"parts",editId),item);

data = data.map(d => d.id===editId ? {id:editId,...item} : d);

render();
clearForm();
};

// DELETE
window.deleteItem = async(id)=>{
await deleteDoc(doc(db,"parts",id));
data = data.filter(d=>d.id!==id);
render();
};

// EDIT
window.editItem = (id)=>{
let d = data.find(x=>x.id===id);

part.value=d.part;
desc.value=d.desc;
make.value=d.make;
engine.value=d.engine;
type.value=d.type;
priceUSD.value=d.priceUSD;

editId=id;
addBtn.style.display="none";
updateBtn.style.display="inline-block";
};

// CLEAR
function clearForm(){
part.value="";
desc.value="";
make.value="";
engine.value="";
priceUSD.value="";
editId=null;
addBtn.style.display="inline-block";
updateBtn.style.display="none";
}

// CSV DOWNLOAD
window.downloadCSV=()=>{
let csv="Part,Desc,Make,Engine,Type,USD,EUR\n";
data.forEach(d=>{
csv+=`${d.part},${d.desc},${d.make},${d.engine},${d.type},${d.priceUSD},${d.priceEUR}\n`;
});
const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ziedel_price_list.csv";
a.click();
};

// CSV UPLOAD
window.uploadFile=()=>{
const file=fileInput.files[0];
if(!file) return alert("Select file");

const reader=new FileReader();
reader.onload=async(e)=>{
let rows=e.target.result.split("\n");

for(let r of rows.slice(1)){
let c=r.split(",");
if(c.length>=6){
let usd=parseFloat(c[5]);
await addDoc(collection(db,"parts"),{
part:c[0],
desc:c[1],
make:c[2],
engine:c[3],
type:c[4],
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});
}
}
fetchData();
};
reader.readAsText(file);
};

// CUSTOMER LINK
window.openCustomer=()=>{
let link=window.location.origin+window.location.pathname+"?view=customer";
window.open(link,"_blank");
};

// RENDER
function render(){
let table=document.getElementById("table");

let searchVal=search.value.toLowerCase();
let filterVal=filterType.value;

let filtered=data.filter(d=>{
let matchSearch =
d.part.toLowerCase().includes(searchVal) ||
d.desc.toLowerCase().includes(searchVal) ||
d.make.toLowerCase().includes(searchVal) ||
d.engine.toLowerCase().includes(searchVal);

let matchType = filterVal==="all" || d.type===filterVal;

return matchSearch && matchType;
});

table.innerHTML=`
<tr>
<th>Part</th>
<th>Description</th>
<th>Make</th>
<th>Engine</th>
<th>Type</th>
<th>Price</th>
<th>Action</th>
</tr>
`;

filtered.forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td class="price">$${d.priceUSD} / €${d.priceEUR}</td>
<td>
<button onclick="editItem('${d.id}')">Edit</button>
<button onclick="deleteItem('${d.id}')">Delete</button>
</td>
</tr>
`;
});
}

// SEARCH LIVE
search.addEventListener("input",render);
filterType.addEventListener("change",render);

</script>

</body>
</html>
