<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAIuTPfhuiUpkyT48ASOZ6k22rYc2xqs48",
  authDomain: "ziedel-price-list.firebaseapp.com",
  projectId: "ziedel-price-list",
  storageBucket: "ziedel-price-list.firebasestorage.app",
  messagingSenderId: "354232126026",
  appId: "1:354232126026:web:78375e019520c04ff474b3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data = [];

// 🔐 AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    showApp();
    fetchData();
  }
});

// LOGIN
window.login = async function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    alert(e.message);
  }
};

// SIGNUP
window.signup = async function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Signup successful!");
  } catch (e) {
    alert(e.message);
  }
};

// LOGOUT
window.logout = async function () {
  await signOut(auth);
  location.reload();
};

// ADD ITEM + ZIEDEL NUMBER
window.addItem = async function () {

  let type = document.getElementById("type").value;

  // Get existing items
  let snapshot = await getDocs(collection(db, "parts"));

  let count = 1;

  snapshot.forEach(doc => {
    let d = doc.data();
    if (d.type === type) count++;
  });

  let prefix = type === "CHRA" ? "1505-250" : "1808-250";

  let ziedel = `${prefix}-${String(count).padStart(4, '0')}`;

  let item = {
    ziedel: ziedel,
    part: document.getElementById("part").value,
    desc: document.getElementById("desc").value,
    make: document.getElementById("make").value.toUpperCase(),
    engine: document.getElementById("engine").value.toUpperCase(),
    type: type,
    price: document.getElementById("price").value,
    created: Date.now()
  };

  await addDoc(collection(db, "parts"), item);

  fetchData();
};

// FETCH DATA
async function fetchData() {

  let q = query(collection(db, "parts"), orderBy("created", "desc"));
  let snapshot = await getDocs(q);

  data = [];

  snapshot.forEach(doc => {
    data.push(doc.data());
  });

  render();
}

// UI
function showApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminControls").style.display = "block";
}

// RENDER
function render() {
  let table = document.getElementById("table");

  table.innerHTML = `
  <tr>
    <th>ZIEDEL</th>
    <th>Part</th>
    <th>Description</th>
    <th>Make</th>
    <th>Engine</th>
    <th>Type</th>
    <th>Price</th>
  </tr>`;

  data.forEach(d => {
    table.innerHTML += `
    <tr>
      <td>${d.ziedel}</td>
      <td>${d.part}</td>
      <td>${d.desc}</td>
      <td>${d.make}</td>
      <td>${d.engine}</td>
      <td>${d.type}</td>
      <td>${d.price}</td>
    </tr>`;
  });
}

</script>
