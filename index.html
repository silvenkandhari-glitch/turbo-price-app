<!DOCTYPE html>
<html>
<head>
<title>ZIEDEL PRICE LIST</title>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
h2{background:#212529;color:white;padding:14px;text-align:center;}

input,select{padding:8px;margin:5px;width:160px;}
button{padding:8px 12px;margin:5px;cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<h2>ZIEDEL PRICE LIST</h2>

<!-- ADMIN -->
<div id="adminControls" style="display:none;">
<button onclick="logout()">Logout</button>

<br><br>

<input id="search" placeholder="Search" onkeyup="render()">

<br>

<input id="part" placeholder="Part No">
<input id="desc" placeholder="Description">
<input id="make" placeholder="Car Make">
<input id="engine" placeholder="Engine Model">

<select id="type">
<option>CHRA</option>
<option>Turbocharger</option>
</select>

<input id="price" placeholder="Price">

<br>

<button onclick="addItem()">Add</button>
</div>

<table id="table"></table>

<script>

const SUPABASE_URL = "https://byrslwvsgdrbnmkfena.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5cnNsd3ZzZmdkcmJubWtmZW5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTQ2MTcsImV4cCI6MjA5MDI3MDYxN30.tBnFmxg8CzNT2OcmlUsVr8DFyHXs0GZJSp6PXf8Ec2A"; // 🔴 PUT YOUR KEY HERE

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data=[];

// ✅ AUTO LOGIN
checkSession();

async function checkSession(){
const { data: { session } } = await supabase.auth.getSession();

if(session){
showApp();
fetchData();
}
}

// 🔐 LOGIN
async function login(){
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();

const { data, error } = await supabase.auth.signInWithPassword({ email, password });

if(error){
alert(error.message);
return;
}

if(data.session){
showApp();
fetchData();
}else{
alert("Wrong email or password");
}
}

// 🆕 SIGNUP
async function signup(){
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();

const { error } = await supabase.auth.signUp({ email, password });

if(error){
alert(error.message);
}else{
alert("Signup success! Now login.");
}
}

// 🚪 LOGOUT
async function logout(){
await supabase.auth.signOut();
location.reload();
}

// UI
function showApp(){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminControls").style.display="block";
}

// DATA
async function fetchData(){
let { data: result } = await supabase.from("parts").select("*");
data=result || [];
render();
}

async function addItem(){
let item={
part:document.getElementById("part").value,
desc:document.getElementById("desc").value,
make:document.getElementById("make").value.toUpperCase(),
engine:document.getElementById("engine").value.toUpperCase(),
type:document.getElementById("type").value,
price:document.getElementById("price").value
};

await supabase.from("parts").insert([item]);
fetchData();
}

function render(){
let table=document.getElementById("table");
table.innerHTML="";

data.forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td>${d.price}</td>
</tr>`;
});
}

</script>

</body>
</html>
