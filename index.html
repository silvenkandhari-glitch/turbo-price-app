<!DOCTYPE html>
<html>
<head>

<title>ZIEDEL PRICE LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h2{
font-family:'Poppins';
background:#212529;
color:white;
padding:14px;
border-radius:6px;
text-align:center;
font-size:30px;
}

.sectionCHRA,.sectionTurbo{
background:#212529;
color:white;
font-size:20px;
padding:10px;
}

.makeHeading{
background:#E85D04;
color:white;
padding:8px;
}

input,select{
padding:8px;
margin:5px;
width:170px;
}

button{
padding:8px 14px;
margin:5px;
background:#495057;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
margin-top:10px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#495057;
color:white;
}

.price{
font-weight:bold;
color:#2D6A4F;
}

/* THEMES */
body.dark{background:#121212;color:white;}
body.dark table{background:#1f1f1f;color:white;}
body.orange h2,body.orange .sectionCHRA,body.orange .sectionTurbo{background:#E85D04;}
body.blue h2,body.blue .sectionCHRA,body.blue .sectionTurbo{background:#1971C2;}
body.green h2,body.green .sectionCHRA,body.green .sectionTurbo{background:#2D6A4F;}

</style>
</head>

<body>

<h2>ZIEDEL PRICE LIST</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- ADMIN -->
<div id="adminControls" style="display:none;">

<input id="search" placeholder="Search Part Number" onkeyup="render()">

<select onchange="changeTheme(this.value)">
<option value="default">Theme</option>
<option value="dark">Dark</option>
<option value="orange">Orange</option>
<option value="blue">Blue</option>
<option value="green">Green</option>
</select>

<br><br>

<input id="part" placeholder="Part No">
<input id="desc" placeholder="Description">
<input id="make" placeholder="Car Make">
<input id="engine" placeholder="Engine Model">

<select id="type">
<option>CHRA</option>
<option>Turbocharger</option>
</select>

<input id="priceUSD" placeholder="Price ($)">

<br>

<button onclick="addItem()">Add / Update</button>
<button onclick="clearAll()">Clear All</button>
<button onclick="downloadCSV()">Download Excel</button>

<input type="file" id="fileInput">

<br>

<button onclick="openCustomer()">Customer Catalog Link</button>

</div>

<table id="table"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIuTPfhuiUpkyT48ASOZ6k22rYc2xqs48",
  authDomain: "ziedel-price-list.firebaseapp.com",
  projectId: "ziedel-price-list"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data=[];
let editId=null;

// CUSTOMER MODE
const urlParams = new URLSearchParams(window.location.search);
const isCustomer = urlParams.get("view") === "customer";

if(isCustomer){
document.getElementById("adminControls").style.display="none";
}

// AUTH
onAuthStateChanged(auth,async(user)=>{
if(user){
loginBox.style.display="none";
adminControls.style.display="block";
await fetchData();
}
});

// LOGIN
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

// FETCH
async function fetchData(){
let snap=await getDocs(collection(db,"parts"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

// ADD / UPDATE
window.addItem=async()=>{
let usd=parseFloat(priceUSD.value);
let eur=(usd*0.92).toFixed(2);

let item={
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:eur
};

if(editId){
await updateDoc(doc(db,"parts",editId),item);
editId=null;
}else{
await addDoc(collection(db,"parts"),item);
}

fetchData();
};

// DELETE
window.deleteItem=async(id)=>{
await deleteDoc(doc(db,"parts",id));
fetchData();
};

// EDIT
window.editItem=(id)=>{
let d=data.find(x=>x.id===id);
part.value=d.part;
desc.value=d.desc;
make.value=d.make;
engine.value=d.engine;
type.value=d.type;
priceUSD.value=d.priceUSD;
editId=id;
};

// CLEAR ALL
window.clearAll=()=>{
if(confirm("Delete all data?")){
data=[];
render();
}
};

// DOWNLOAD CSV
window.downloadCSV=()=>{
let csv="Part No,Description,Car Make,Engine Model,Type,Price USD,Price EUR\n";

data.forEach(d=>{
csv+=`${d.part},${d.desc},${d.make},${d.engine},${d.type},${d.priceUSD},${d.priceEUR}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ziedel_price_list.csv";
a.click();
};

// UPLOAD CSV
document.getElementById("fileInput").addEventListener("change",function(e){
const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(event){
const lines=event.target.result.split("\n");

lines.slice(1).forEach(async row=>{
let cols=row.split(",");
if(cols.length>=6){

let usd=parseFloat(cols[5]);

await addDoc(collection(db,"parts"),{
part:cols[0],
desc:cols[1],
make:cols[2],
engine:cols[3],
type:cols[4],
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});

}
});

fetchData();
};

reader.readAsText(file);
});

// CUSTOMER LINK
window.openCustomer=()=>{
const link=window.location.origin+window.location.pathname+"?view=customer";
window.open(link,"_blank");
};

// THEME
window.changeTheme=(t)=>{
document.body.className=t==="default"?"":t;
};

// RENDER
function render(){

let table=document.getElementById("table");
table.innerHTML="";

let searchVal=search.value.toLowerCase();

let filtered=data.filter(d=>d.part.toLowerCase().includes(searchVal));

let chra=filtered.filter(d=>d.type==="CHRA");
let turbo=filtered.filter(d=>d.type==="Turbocharger");

renderSection("CHRA LIST",chra,"sectionCHRA");
renderSection("TURBOCHARGER LIST",turbo,"sectionTurbo");

}

function renderSection(title,list,style){

if(list.length===0) return;

let table=document.getElementById("table");

table.innerHTML+=`<tr><td colspan="${isCustomer?6:7}" class="${style}">${title}</td></tr>`;

let grouped={};

list.forEach(d=>{
if(!grouped[d.make]) grouped[d.make]=[];
grouped[d.make].push(d);
});

for(let make in grouped){

table.innerHTML+=`<tr><td colspan="${isCustomer?6:7}" class="makeHeading">${make}</td></tr>`;

table.innerHTML+=`
<tr>
<th>Part No</th>
<th>Description</th>
<th>Car Make</th>
<th>Engine Model</th>
<th>Type</th>
<th>Price</th>
${isCustomer?"":"<th>Action</th>"}
</tr>`;

grouped[make].forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td class="price">$${d.priceUSD} / €${d.priceEUR}</td>
${isCustomer?"":`<td>
<button onclick="editItem('${d.id}')">Edit</button>
<button onclick="deleteItem('${d.id}')">Delete</button>
</td>`}
</tr>`;
});

}

}

</script>

</body>
</html>
