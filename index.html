<!DOCTYPE html>
<html>
<head>

<title>ZIEDEL PRICE LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{font-family:Arial;background:#f5f5f5;padding:20px;}

h2{
font-family:'Poppins';
background:#212529;
color:white;
padding:14px;
border-radius:6px;
text-align:center;
font-size:30px;
}

.sectionCHRA,.sectionTurbo{
background:#212529;
color:white;
font-size:20px;
padding:10px;
}

.makeHeading{
background:#E85D04;
color:white;
padding:8px;
}

input,select{
padding:8px;
margin:5px;
width:170px;
}

button{
padding:8px 14px;
margin:5px;
background:#495057;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
margin-top:10px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#495057;
color:white;
}

.price{
font-weight:bold;
color:#2D6A4F;
}

</style>
</head>

<body>

<h2>ZIEDEL PRICE LIST</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- ADMIN -->
<div id="adminControls" style="display:none;">

<input id="search" placeholder="Search Part Number">

<br><br>

<input id="part" placeholder="Part No">
<input id="desc" placeholder="Description">
<input id="make" placeholder="Car Make">
<input id="engine" placeholder="Engine Model">

<select id="type">
<option>CHRA</option>
<option>Turbocharger</option>
</select>

<input id="priceUSD" placeholder="Price ($)">

<br>

<button onclick="addItem()">Add Product</button>
<button onclick="updateItem()">Update Product</button>
<button onclick="downloadCSV()">Download Excel</button>

</div>

<table id="table"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ELEMENTS
const loginBox = document.getElementById("loginBox");
const adminControls = document.getElementById("adminControls");
const table = document.getElementById("table");

const email = document.getElementById("email");
const password = document.getElementById("password");

const part = document.getElementById("part");
const desc = document.getElementById("desc");
const make = document.getElementById("make");
const engine = document.getElementById("engine");
const type = document.getElementById("type");
const priceUSD = document.getElementById("priceUSD");
const search = document.getElementById("search");

const firebaseConfig = {
  apiKey: "AIzaSyAIuTPfhuiUpkyT48ASOZ6k22rYc2xqs48",
  authDomain: "ziedel-price-list.firebaseapp.com",
  projectId: "ziedel-price-list"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data = [];
let editId = null;

// AUTH
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    adminControls.style.display = "block";
    listenData();
  }
});

// LOGIN
window.login = () => signInWithEmailAndPassword(auth, email.value, password.value);
window.signup = () => createUserWithEmailAndPassword(auth, email.value, password.value);

// REAL-TIME LISTENER (NO LAG)
function listenData() {
  onSnapshot(collection(db, "parts"), (snapshot) => {
    data = [];
    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
    render();
  });
}

// ADD
window.addItem = async () => {
  let usd = parseFloat(priceUSD.value || 0);

  await addDoc(collection(db, "parts"), {
    part: part.value,
    desc: desc.value,
    make: make.value.toUpperCase(),
    engine: engine.value.toUpperCase(),
    type: type.value,
    priceUSD: usd,
    priceEUR: (usd * 0.92).toFixed(2)
  });

  clearForm();
};

// UPDATE
window.updateItem = async () => {
  if (!editId) return alert("Select item first");

  let usd = parseFloat(priceUSD.value || 0);

  await updateDoc(doc(db, "parts", editId), {
    part: part.value,
    desc: desc.value,
    make: make.value.toUpperCase(),
    engine: engine.value.toUpperCase(),
    type: type.value,
    priceUSD: usd,
    priceEUR: (usd * 0.92).toFixed(2)
  });

  editId = null;
  clearForm();
};

// DELETE
window.deleteItem = async (id) => {
  if (confirm("Delete item?")) {
    await deleteDoc(doc(db, "parts", id));
  }
};

// EDIT
window.editItem = (id) => {
  let d = data.find(x => x.id === id);

  part.value = d.part;
  desc.value = d.desc;
  make.value = d.make;
  engine.value = d.engine;
  type.value = d.type;
  priceUSD.value = d.priceUSD;

  editId = id;
};

// CLEAR
function clearForm() {
  part.value = "";
  desc.value = "";
  make.value = "";
  engine.value = "";
  priceUSD.value = "";
}

// SEARCH
search.addEventListener("keyup", render);

// RENDER
function render() {

  table.innerHTML = "";

  let val = search.value.toLowerCase();

  let filtered = data.filter(d => d.part.toLowerCase().includes(val));

  filtered.forEach(d => {
    table.innerHTML += `
<tr>
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td class="price">$${d.priceUSD} / €${d.priceEUR}</td>
<td>
<button onclick="editItem('${d.id}')">Edit</button>
<button onclick="deleteItem('${d.id}')">Delete</button>
</td>
</tr>`;
  });
}

</script>

</body>
</html>
