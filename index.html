<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIuTPfhuiUpkyT48ASOZ6k22rYc2xqs48",
  authDomain: "ziedel-price-list.firebaseapp.com",
  projectId: "ziedel-price-list"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data=[];
let editId=null;

// SAFE ELEMENTS
const loginBox = document.getElementById("loginBox");
const adminControls = document.getElementById("adminControls");

// CUSTOMER MODE
const urlParams = new URLSearchParams(window.location.search);
const isCustomer = urlParams.get("view") === "customer";

if(isCustomer){
adminControls.style.display="none";
}

// AUTH
onAuthStateChanged(auth,(user)=>{
if(user){
loginBox.style.display="none";
adminControls.style.display="block";
listenData(); // 🔥 REAL TIME
}
});

// LOGIN
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

// 🔥 REAL-TIME DATA (NO LAG)
function listenData(){
onSnapshot(collection(db,"parts"),(snapshot)=>{
data=[];
snapshot.forEach(d=>data.push({id:d.id,...d.data()}));
render();
});
}

// ADD
window.addItem=async()=>{
let usd=parseFloat(priceUSD.value || 0);

await addDoc(collection(db,"parts"),{
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});

clearForm();
};

// UPDATE
window.updateItem=async()=>{
if(!editId) return alert("Select item to update");

let usd=parseFloat(priceUSD.value || 0);

await updateDoc(doc(db,"parts",editId),{
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});

editId=null;
clearForm();
};

// DELETE
window.deleteItem=async(id)=>{
if(confirm("Are you sure you want to delete this item?")){
await deleteDoc(doc(db,"parts",id));
}
};

// EDIT
window.editItem=(id)=>{
let d=data.find(x=>x.id===id);
part.value=d.part;
desc.value=d.desc;
make.value=d.make;
engine.value=d.engine;
type.value=d.type;
priceUSD.value=d.priceUSD;
editId=id;
};

// CLEAR FORM
function clearForm(){
part.value="";
desc.value="";
make.value="";
engine.value="";
priceUSD.value="";
editId=null;
}

// DOWNLOAD CSV
window.downloadCSV=()=>{
let csv="Part No,Description,Car Make,Engine Model,Type,Price USD,Price EUR\n";

data.forEach(d=>{
csv+=`${d.part},${d.desc},${d.make},${d.engine},${d.type},${d.priceUSD},${d.priceEUR}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ziedel_price_list.csv";
a.click();
};

// UPLOAD CSV (UNCHANGED BUT NO EXTRA FETCH)
document.getElementById("fileInput").addEventListener("change",function(e){
const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(event){
const lines=event.target.result.split("\n");

lines.slice(1).forEach(async row=>{
let cols=row.split(",");
if(cols.length>=6){

let usd=parseFloat(cols[5]);

await addDoc(collection(db,"parts"),{
part:cols[0],
desc:cols[1],
make:cols[2],
engine:cols[3],
type:cols[4],
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});

}
});
};

reader.readAsText(file);
});

// CUSTOMER LINK
window.openCustomer=()=>{
const link=window.location.origin+window.location.pathname+"?view=customer";
window.open(link,"_blank");
};

// THEME
window.changeTheme=(t)=>{
document.body.className=t==="default"?"":t;
};

// RENDER (SMALL FIX)
function render(){

let table=document.getElementById("table");
table.innerHTML="";

let searchVal = document.getElementById("search") ? document.getElementById("search").value.toLowerCase() : "";

let filtered=data.filter(d=>d.part.toLowerCase().includes(searchVal));

let chra=filtered.filter(d=>d.type==="CHRA");
let turbo=filtered.filter(d=>d.type==="Turbocharger");

renderSection("CHRA LIST",chra,"sectionCHRA");
renderSection("TURBOCHARGER LIST",turbo,"sectionTurbo");

}

function renderSection(title,list,style){

if(list.length===0) return;

let table=document.getElementById("table");

table.innerHTML+=`<tr><td colspan="${isCustomer?6:7}" class="${style}">${title}</td></tr>`;

let grouped={};

list.forEach(d=>{
if(!grouped[d.make]) grouped[d.make]=[];
grouped[d.make].push(d);
});

for(let make in grouped){

table.innerHTML+=`<tr><td colspan="${isCustomer?6:7}" class="makeHeading">${make}</td></tr>`;

table.innerHTML+=`
<tr>
<th>Part No</th>
<th>Description</th>
<th>Car Make</th>
<th>Engine Model</th>
<th>Type</th>
<th>Price</th>
${isCustomer?"":"<th>Action</th>"}
</tr>`;

grouped[make].forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td class="price">$${d.priceUSD} / €${d.priceEUR}</td>
${isCustomer?"":`<td>
<button onclick="editItem('${d.id}')">Edit</button>
<button onclick="deleteItem('${d.id}')">Delete</button>
</td>`}
</tr>`;
});

}

}

</script>
