<!DOCTYPE html>
<html>
<head>

<title>ZIEDEL PRICE LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h2{
font-family:'Poppins';
background:#212529;
color:white;
padding:14px;
border-radius:6px;
text-align:center;
font-size:30px;
}

.sectionCHRA,.sectionTurbo{
background:#212529;
color:white;
font-size:20px;
padding:10px;
}

.makeHeading{
background:#E85D04;
color:white;
padding:8px;
}

input,select{
padding:8px;
margin:5px;
width:170px;
}

button{
padding:8px 14px;
margin:5px;
background:#495057;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
margin-top:10px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#495057;
color:white;
}

.price{
font-weight:bold;
color:#2D6A4F;
}

#suggestions{
background:white;
position:absolute;
z-index:1000;
width:170px;
border:1px solid #ccc;
max-height:200px;
overflow-y:auto;
}

#suggestions div:hover{
background:#f1f1f1;
}

</style>
</head>

<body>

<h2>ZIEDEL PRICE LIST</h2>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<div id="adminControls" style="display:none;">

<div style="position:relative;">
<input id="search" placeholder="Search Part Number">
<div id="suggestions"></div>
</div>

<button onclick="render()">Search</button>

<select id="filterType">
<option value="all">All Types</option>
<option value="CHRA">CHRA</option>
<option value="Turbocharger">Turbocharger</option>
</select>

<br><br>

<input id="part" placeholder="Part No">
<input id="desc" placeholder="Description">
<input id="make" placeholder="Car Make">
<input id="engine" placeholder="Engine Model">

<select id="type">
<option>CHRA</option>
<option>Turbocharger</option>
</select>

<input id="priceUSD" placeholder="Price ($)">

<br>

<button id="addBtn" onclick="addItem()">Add / Update</button>

</div>

<table id="table"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR KEY",
authDomain: "YOUR DOMAIN",
projectId: "YOUR PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let data=[];

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

onAuthStateChanged(auth,async(user)=>{
if(user){
loginBox.style.display="none";
adminControls.style.display="block";
await fetchData();
}
});

async function fetchData(){
let snap=await getDocs(collection(db,"parts"));
data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));
render();
}

// 🔍 LIVE SEARCH DROPDOWN
let debounceTimer;

document.getElementById("search").addEventListener("input", function () {
clearTimeout(debounceTimer);
debounceTimer = setTimeout(showSuggestions, 200);
});

function showSuggestions(){

let val = search.value.toLowerCase();
let box = document.getElementById("suggestions");

box.innerHTML="";

if(!val) return;

let matches = data.filter(d=>d.part.toLowerCase().includes(val)).slice(0,8);

matches.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.part;
div.style.padding="6px";
div.style.cursor="pointer";

div.onclick=()=>{
search.value=d.part;
box.innerHTML="";
render();
};

box.appendChild(div);
});
}

// CLOSE DROPDOWN
document.addEventListener("click",function(e){
if(!e.target.closest("#search")){
suggestions.innerHTML="";
}
});

// ADD ITEM
window.addItem=async()=>{

let usd=parseFloat(priceUSD.value);

await addDoc(collection(db,"parts"),{
part:part.value,
desc:desc.value,
make:make.value.toUpperCase(),
engine:engine.value.toUpperCase(),
type:type.value,
priceUSD:usd,
priceEUR:(usd*0.92).toFixed(2)
});

part.value="";
desc.value="";
make.value="";
engine.value="";
priceUSD.value="";

fetchData();
};

// ⚡ FAST RENDER
function render(){

let table=document.getElementById("table");
table.innerHTML="";

let searchVal=search.value.toLowerCase();
let filterVal=filterType.value;

let filtered=[];

for(let i=0;i<data.length;i++){
let d=data[i];

if(d.part.toLowerCase().includes(searchVal) &&
(filterVal==="all" || d.type===filterVal)){
filtered.push(d);
}
}

renderSection("CHRA LIST",filtered.filter(d=>d.type==="CHRA"),"sectionCHRA");
renderSection("TURBO LIST",filtered.filter(d=>d.type==="Turbocharger"),"sectionTurbo");
}

// ⚡ FAST SECTION RENDER
function renderSection(title,list,style){

if(list.length===0) return;

let table=document.getElementById("table");

let headerRow=document.createElement("tr");
headerRow.innerHTML=`<td colspan="6" class="${style}">${title}</td>`;
table.appendChild(headerRow);

list.forEach(d=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.part}</td>
<td>${d.desc}</td>
<td>${d.make}</td>
<td>${d.engine}</td>
<td>${d.type}</td>
<td class="price">$${d.priceUSD} / €${d.priceEUR}</td>
`;

table.appendChild(tr);

});
}

</script>

</body>
</html>
